[project]
name = "hello-agents"
version = "2026.4.0"
description = "Agent concepts playground"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "any-llm-sdk[all]>=1.14.0",
  "google-search-results>=2.4.2",
  "langchain>=1.3.0",
  "langchain-community>=0.4.1",
  "langchain-openai>=1.2.1",
  "langgraph>=1.2.0",
  "litellm>=1.83.14",
  "nest-asyncio>=1.6.0",
  "pydantic>=2.13.4",
  "republic>=0.5.8",
  "smolagents[toolkit]>=1.24.0",
]

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "ruff>=0.15.12",
  "ty>=0.0.35",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ulib"]

[tool.pyrefly]
project-includes = [
  "**/*.py",
  "**/*.ipynb",
]

[tool.uv]
python-preference = "managed"
prerelease = "allow"
resolution = "highest"
