[project]
name = "hello-agents"
version = "2026.3.0"
description = "Agent concepts playground"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "any-llm-sdk[all]>=1.12.1",
  "google-search-results>=2.4.2",
  "langchain>=1.2.12",
  "langchain-community>=0.4.1",
  "langchain-openai>=1.1.11",
  "langgraph>=1.1.3",
  "litellm>=1.82.4",
  "nest-asyncio>=1.6.0",
  "pydantic>=2.12.5",
  "python-dotenv>=1.2.2",
  "republic>=0.5.6",
  "smolagents[toolkit]>=1.24.0",
]

[dependency-groups]
dev = [
  "pytest>=9.0.2",
  "ruff>=0.15.6",
  "ty>=0.0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ulib"]

[tool.pyrefly]
project-includes = [
  "**/*.py",
  "**/*.ipynb",
]

[tool.uv]
python-preference = "managed"
prerelease = "if-necessary-or-explicit"
resolution = "highest"
